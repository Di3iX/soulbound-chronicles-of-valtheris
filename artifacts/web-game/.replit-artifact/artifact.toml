kind = "web"
previewPath = "/"
title = "Web Game"
version = "1.0.0"
id = "artifacts/web-game"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23885

[services.development]
run = "pnpm --filter @workspace/web-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web-game", "run", "build" ]
serve = "static"
publicDir = "artifacts/web-game/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23885"
BASE_PATH = "/"
